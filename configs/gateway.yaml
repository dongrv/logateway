server:
  listen_addr: ":8080"
  read_timeout: 3s
  write_timeout: 5s
  max_body_bytes: 1048576
  global_rate_limit: 20000
  ants_pool_size: 10000
  backpressure: fallback
  idle_timeout: 120s
  env: "production"

auth:
  enabled: true
  timestamp_window: 300
  nonce_ttl_seconds: 300
  nonce_cache_size: 100000

sinks:
  redis:
    addr: "127.0.0.1:6379"
    password: ""
    db: 0
    pool_size: 100
    min_idle_conns: 10
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s

projects:
  - name: actilogs
    enabled: true
    sinks:
      - type: redis
        config:
          key: "queue:actilogs"
          type: list
          max_len: 1000000
    rate_limit: 10000
    max_body_bytes: 524288
    auth_required: true
    pipelines:
      - type: field_filter
        config:
          mode: exclude
          fields: ["internal_token", "raw_password"]

wal:
  enabled: true
  dir: "data/wal"
  max_segment_bytes: 67108864
  max_segments: 10
  sync_interval: 100ms

pipeline:
  max_depth: 10

log:
  level: "info"
  console:
    enabled: true
    format: "text"
  file:
    enabled: true
    dir: "logs"
    levels: ["error", "warn"]
    max_age: 7

metrics:
  enabled: true
  path: "/metrics"
